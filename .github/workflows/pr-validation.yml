# Validate pull requests against the branching strategy
#
# Enforces:
#   - Branch naming conventions
#   - Correct PR target branches
#   - Merge method recommendations
#   - Build passes

name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, edited, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-branch:
    name: Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch naming and target
        uses: actions/github-script@v7
        with:
          script: |
            const head = context.payload.pull_request.head.ref;
            const base = context.payload.pull_request.base.ref;
            const prNumber = context.payload.pull_request.number;
            const errors = [];
            const warnings = [];

            // ── Branch naming validation ──
            const allowedPatterns = [
              /^feature\/.+$/,
              /^fix\/.+$/,
              /^chore\/.+$/,
              /^refactor\/.+$/,
              /^release\/\d{4}-\d{2}-\d{2}$/,
              /^hotfix\/\d{4}-\d{2}-\d{2}$/,
              /^cherry-pick\/.+$/,
            ];

            const isValidBranch = allowedPatterns.some(p => p.test(head));
            if (!isValidBranch) {
              errors.push(
                `**Branch name** \`${head}\` does not match any allowed pattern.\n` +
                `Expected: \`feature/*\`, \`fix/*\`, \`chore/*\`, \`refactor/*\`, \`release/YYYY-MM-DD\`, \`hotfix/YYYY-MM-DD\`, or \`cherry-pick/*\``
              );
            }

            // ── Target branch validation ──
            const featurePrefixes = ['feature/', 'fix/', 'chore/', 'refactor/'];
            const isFeatureBranch = featurePrefixes.some(p => head.startsWith(p));
            const isReleaseBranch = head.startsWith('release/');
            const isHotfixBranch = head.startsWith('hotfix/');
            const isCherryPick = head.startsWith('cherry-pick/');

            // Feature branches must target development
            if (isFeatureBranch && base === 'development') {
              // Correct — feature -> development
            } else if (isFeatureBranch && base.startsWith('release/')) {
              // Also valid — fix branch targeting a release branch
            } else if (isFeatureBranch && base.startsWith('hotfix/')) {
              // Also valid — fix branch targeting a hotfix branch
            } else if (isFeatureBranch) {
              errors.push(
                `**Target mismatch:** Feature branch \`${head}\` targets \`${base}\`.\n` +
                `Feature branches should target \`development\`, a \`release/*\`, or a \`hotfix/*\` branch.`
              );
            }

            // Forward-merge: release/hotfix branches must target development
            if ((isReleaseBranch || isHotfixBranch) && base !== 'development') {
              errors.push(
                `**Target mismatch:** \`${head}\` targets \`${base}\`.\n` +
                `Release and hotfix branches should target \`development\` (forward-merge).`
              );
            }

            // Cherry-pick branches must target a release branch
            if (isCherryPick && !base.startsWith('release/')) {
              errors.push(
                `**Target mismatch:** Cherry-pick branch \`${head}\` targets \`${base}\`.\n` +
                `Cherry-pick branches should target a \`release/*\` branch.`
              );
            }

            // ── Merge method recommendations ──
            if (isFeatureBranch && base === 'development') {
              warnings.push(`:bulb: **Merge method:** Use **squash merge** for feature branches into development.`);
            }

            if ((isReleaseBranch || isHotfixBranch) && base === 'development') {
              warnings.push(`:bulb: **Merge method:** Use **merge commit** for forward-merge PRs to preserve history.`);
            }

            // ── Post results ──
            let body = '';

            if (errors.length > 0) {
              body += `### Branch Policy Violations\n\n${errors.map(e => `- ${e}`).join('\n\n')}\n\n`;
            }

            if (warnings.length > 0) {
              body += `### Recommendations\n\n${warnings.join('\n\n')}\n\n`;
            }

            if (errors.length === 0 && warnings.length === 0) {
              body = ':white_check_mark: Branch naming and target are valid.';
            }

            // Find and update existing bot comment, or create a new one
            const marker = '<!-- pr-validation-bot -->';
            body = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

            // Fail the check if there are errors
            if (errors.length > 0) {
              core.setFailed(`Branch policy violations found. See PR comment for details.`);
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
